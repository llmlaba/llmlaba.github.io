<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  {% seo %}
  {% include head-custom.html %}
</head>
<body class="bg-surface-900 text-gray-100 min-h-screen flex flex-col">

  <!-- TOP NAV BAR -->
  <header class="fixed top-0 left-0 right-0 z-50 h-14 bg-surface-800 border-b border-gray-800 flex items-center px-4 gap-4">
    <a href="{{ '/' | absolute_url }}" class="text-white font-bold text-lg tracking-tight hover:text-accent transition-colors">
      {{ site.title }}
    </a>
    <a href="{{ '/about' | relative_url }}" class="text-gray-400 hover:text-white text-sm transition-colors">About</a>
  </header>

  <!-- HERO -->
  <div class="pt-14">
    <div class="relative flex items-center justify-center h-48 bg-surface-800 border-b border-gray-800 overflow-hidden">
      <img src="{{ '/assets/home.svg' | relative_url }}" alt="" aria-hidden="true"
           class="absolute inset-0 w-full h-full object-cover opacity-30">
      <div class="relative text-center px-4">
        <h1 class="text-3xl font-bold text-white tracking-tight">{{ site.title }}</h1>
        <p class="mt-2 text-gray-400 text-sm">{{ site.description }}</p>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="flex-1 px-6 lg:px-16 py-10 max-w-5xl mx-auto w-full">
    <article class="prose prose-invert prose-code:font-mono max-w-none">
      {{ content }}
    </article>
  </main>

  <!-- FOOTER -->
  <footer class="border-t border-gray-800 px-6 py-4 text-sm text-gray-500 text-center">
    {{ site.title }} — Published with
    <a href="https://pages.github.com" class="hover:text-white transition-colors">GitHub Pages</a>
    by {{ site.owner }}
  </footer>

  <script src="{{ '/assets/js/bundle.js' | relative_url }}"></script>

</body>
</html>
